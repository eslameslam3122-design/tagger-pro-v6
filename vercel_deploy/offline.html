<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAGGER PRO - أوفلاين</title>
    <link href="vendor/fonts/cairo.css" rel="stylesheet">
    <link rel="stylesheet" href="vendor/fontawesome/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #080c16;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 400px;
        }
        .icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(59,130,246,0.2));
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }
        .icon i { font-size: 48px; color: #a855f7; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
        .subtitle { color: #8892b8; font-size: 14px; margin-bottom: 32px; }
        .status-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        .status-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-label { color: #8892b8; font-size: 13px; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
        }
        .dot-offline { background: #ef4444; animation: blink 1s infinite; }
        .dot-online { background: #22c55e; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .retry-btn {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 14px;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(168,85,247,0.4); }
        .offline-features {
            margin-top: 32px;
            text-align: right;
        }
        .offline-features h3 { color: #8892b8; font-size: 12px; margin-bottom: 12px; text-align: center; }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            font-size: 13px;
            color: #d0d8f0;
        }
        .feature-item i { color: #22c55e; font-size: 12px; width: 20px; text-align: center; }
        .version { color: #555; font-size: 11px; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <i class="fa-solid fa-wifi"></i>
        </div>
        <h1>لا يوجد اتصال بالإنترنت</h1>
        <p class="subtitle">البرنامج يعمل أوفلاين - بياناتك محفوظة محلياً</p>

        <div class="status-card">
            <div class="status-row">
                <span class="status-label">حالة الاتصال</span>
                <span><span class="status-dot dot-offline"></span> <span style="color:#ef4444;font-size:13px;font-weight:bold;">غير متصل</span></span>
            </div>
            <div class="status-row">
                <span class="status-label">البيانات المحفوظة</span>
                <span style="color:#22c55e;font-size:13px;font-weight:bold;">متاحة</span>
            </div>
            <div class="status-row">
                <span class="status-label">المزامنة</span>
                <span style="color:#eab308;font-size:13px;font-weight:bold;">بانتظار الاتصال</span>
            </div>
        </div>

        <button class="retry-btn" onclick="location.reload()">
            <i class="fa-solid fa-rotate-right"></i> إعادة المحاولة
        </button>

        <div class="offline-features">
            <h3>المميزات المتاحة أوفلاين</h3>
            <div class="feature-item"><i class="fa-solid fa-check"></i> عرض المنتجات والمخزون</div>
            <div class="feature-item"><i class="fa-solid fa-check"></i> إنشاء فواتير جديدة</div>
            <div class="feature-item"><i class="fa-solid fa-check"></i> إدارة العملاء</div>
            <div class="feature-item"><i class="fa-solid fa-check"></i> حساب المحاسبة</div>
            <div class="feature-item"><i class="fa-solid fa-clock"></i> المزامنة تلقائياً عند عودة الاتصال</div>
        </div>

        <p class="version">TAGGER PRO V6</p>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(reg => {
                if (reg.active) reg.active.postMessage({ type: 'SKIP_WAITING' });
            });
        }
        window.addEventListener('online', () => location.reload());
    </script>
</body>
</html>
