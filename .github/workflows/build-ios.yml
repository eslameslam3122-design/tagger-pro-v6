name: Build iOS Simulator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify Node version
        run: node --version

      - name: Install dependencies
        run: npm ci

      - name: Clear npx cache
        run: npx clear-npx-cache || true

      - name: Add iOS platform
        run: npx cap add ios || true

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: |
          pod install || true

      - name: Build for iOS Simulator
        working-directory: ios/App
        run: |
          if [ -f "App.xcworkspace" ]; then
            xcodebuild -workspace App.xcworkspace \
              -scheme App \
              -sdk iphonesimulator \
              -configuration Debug \
              -derivedDataPath $PWD/build \
              build
          elif [ -f "App.xcodeproj" ]; then
            xcodebuild -project App.xcodeproj \
              -scheme App \
              -sdk iphonesimulator \
              -configuration Debug \
              -derivedDataPath $PWD/build \
              build
          else
            echo "No .xcworkspace or .xcodeproj found"
            ls -la
            exit 1
          fi

      - name: Zip .app bundle
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r -y TaggerPro-Simulator.zip App.app

      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: tagger-pro-ios-simulator
          path: ios/App/build/Build/Products/Debug-iphonesimulator/TaggerPro-Simulator.zip
