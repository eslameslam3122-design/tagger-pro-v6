name: Build iOS Simulator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify Node version
        run: node --version

      - name: Install dependencies
        run: npm ci

      - name: Clear npx cache
        run: npx clear-npx-cache || true

      - name: Add iOS platform
        run: npx cap add ios || true

      - name: Fix AppDelegate for Capacitor 8 SPM compatibility
        run: |
          python3 -c "
          content = open('ios/App/App/AppDelegate.swift').read()
          content = content.replace(
              'return ApplicationDelegateProxy.shared.application(application, continue: userActivity, restorationHandler: restorationHandler)',
              'if userActivity.activityType == NSUserActivityTypeBrowsingWeb, let url = userActivity.webpageURL { NotificationCenter.default.post(name: .capacitorOpenUniversalLink, object: [\"url\": url]); return true }; return false'
          )
          open('ios/App/App/AppDelegate.swift', 'w').write(content)
          print('AppDelegate patched successfully')
          "

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: |
          pod install || true

      - name: Build for iOS Simulator
        working-directory: ios/App
        run: |
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath $PWD/build \
            build

      - name: Zip .app bundle
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r -y TaggerPro-Simulator.zip App.app

      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: tagger-pro-ios-simulator
          path: ios/App/build/Build/Products/Debug-iphonesimulator/TaggerPro-Simulator.zip
