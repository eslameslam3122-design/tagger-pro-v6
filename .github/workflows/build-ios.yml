name: Build iOS Simulator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Add iOS platform
        run: npx cap add ios || true

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build for iOS Simulator
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath $PWD/build \
            build

      - name: Zip .app bundle
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r -y TaggerPro-Simulator.zip App.app

      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: tagger-pro-ios-simulator
          path: ios/App/build/Build/Products/Debug-iphonesimulator/TaggerPro-Simulator.zip
