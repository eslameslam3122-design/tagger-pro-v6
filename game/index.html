<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>War</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;overflow:hidden;touch-action:none;font-family:sans-serif;user-select:none}
canvas{display:block}
#hud{position:absolute;top:0;width:100%;z-index:10;display:flex;justify-content:space-between;padding:6px 12px;background:rgba(0,0,0,.85);color:#fff;font-size:13px}
#tl{position:absolute;top:36px;left:50%;transform:translateX(-50%);z-index:10;padding:4px 16px;border-radius:16px;font-size:13px;font-weight:700;color:#fff;background:rgba(74,158,255,.4)}
#info{position:absolute;top:58px;left:50%;transform:translateX(-50%);z-index:10;padding:3px 12px;border-radius:10px;font-size:10px;color:#ccc;background:rgba(0,0,0,.5);pointer-events:none}
#acts{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px}
.ab{padding:5px 12px;border-radius:14px;font-size:10px;font-weight:700;color:#fff;border:2px solid #888;background:rgba(0,0,0,.7);cursor:pointer}
#gp{position:absolute;bottom:100px;right:10px;z-index:10;display:flex;flex-direction:column;gap:4px}
.gb{width:36px;height:36px;border-radius:8px;font-size:14px;font-weight:700;color:#fff;border:2px solid #666;background:rgba(0,0,0,.7);cursor:pointer;display:flex;align-items:center;justify-content:center}
#bp{position:absolute;bottom:0;width:100%;z-index:10;background:rgba(0,0,0,.85);padding:4px 6px 8px;display:flex;justify-content:center;gap:4px;flex-wrap:wrap}
.b{padding:6px 10px;border:2px solid #555;border-radius:8px;background:rgba(255,255,255,.08);color:#fff;font-size:11px;cursor:pointer;text-align:center;min-width:50px}
.b:active{transform:scale(.95)}.b.bu{border-color:#4a9eff}.b.ru{border-color:#ff4a4a}
#ui{color:#aaa;font-size:11px;text-align:center;margin-bottom:4px;min-height:14px}
#ov{position:absolute;top:0;width:100%;height:100%;display:none;z-index:20;background:rgba(0,0,0,.75);justify-content:center;align-items:center;flex-direction:column}
#ov.show{display:flex}#ov h1{color:#fff;font-size:28px;margin:10px}#ov p{color:#ccc;font-size:14px;margin:10px}#ov button{padding:12px 40px;border-radius:10px;border:2px solid #4a9eff;background:rgba(74,158,255,.2);color:#fff;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<canvas id="g"></canvas>
<div id="hud"><span style="color:#4a9eff">B:<span id="bc">3</span></span><span style="color:#ff4a4a">R:<span id="rc">3</span></span></div>
<div id="tl">Blue Team</div>
<div id="info">tap unit=select | tap empty=move | longpress+drag=box select | tap enemy=attack | 1,2,3=save/recall group</div>
<div id="unit-info"></div>
<div id="acts"><button class="ab" onclick="selAll()">All</button><button class="ab" onclick="deselAll()">Clear</button><button class="ab" onclick="swTeam()">Switch</button></div>
<div id="gp"><div class="gb" onclick="grpClick(0)" id="gb0">1</div><div class="gb" onclick="grpClick(1)" id="gb1">2</div><div class="gb" onclick="grpClick(2)" id="gb2">3</div></div>
<div id="bp"></div>
<div id="ov"><h1 id="wt"></h1><p id="ws"></p><button onclick="restart()">Play Again</button></div>
<script src="game.js"></script>
</body>
</html>
